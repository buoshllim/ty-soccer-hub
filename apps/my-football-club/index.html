<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Football Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #ffffff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
    }

    /* 페이지 숨기기/보이기 */
    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* 공통 헤더 */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 2px solid #00ff88;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 20px;
      color: #00ff88;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* 홈 페이지 */
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 32px;
      padding: 20px;
    }

    .club-name {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .club-subtitle {
      font-size: 14px;
      color: #888;
      letter-spacing: 2px;
    }

    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 300px;
    }

    /* 버튼 스타일 */
    .btn-primary {
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #0a0a0f;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #00cc6a, #00aa55);
    }

    .btn-secondary {
      background: transparent;
      color: #00ff88;
      border: 2px solid #00ff88;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 136, 0.1);
    }

    .btn-back {
      background: transparent;
      color: #888;
      border: 1px solid #333;
      padding: 8px 16px;
      font-size: 13px;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-back:hover {
      color: #fff;
      border-color: #fff;
    }

    /* 이적시장 페이지 */
    .market-content {
      padding: 20px;
    }

    .budget-bar {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .budget-label {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
    }

    .budget-amount {
      font-size: 24px;
      font-weight: bold;
      color: #00ff88;
    }

    /* 팀관리 페이지 */
    .team-content { padding: 20px; }

    /* 필터 버튼 */
    .filter-btn {
      background: #1a1a2e; color: #888; border: 1px solid #333;
      padding: 6px 14px; font-size: 12px; border-radius: 20px; cursor: pointer;
      letter-spacing: 1px;
    }
    .filter-btn.active { background: #00ff88; color: #0a0a0f; border-color: #00ff88; font-weight: bold; }

    /* 선수 카드 */
    .player-card {
      background: #111122; border-radius: 8px; padding: 14px 16px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
      border-left: 4px solid #333;
    }
    .player-card.rare   { border-left-color: #ff4444; }
    .player-card.gold   { border-left-color: #ffd700; }
    .player-card.silver { border-left-color: #c0c0c0; }
    .player-card.fans   { border-left-color: #00aaff; }
    .player-card.core   { border-left-color: #666; }

    .tier-badge {
      font-size: 9px; font-weight: bold; letter-spacing: 1px;
      padding: 2px 6px; border-radius: 3px; white-space: nowrap;
    }
    .tier-badge.rare   { background:#ff4444; color:#fff; }
    .tier-badge.gold   { background:#ffd700; color:#000; }
    .tier-badge.silver { background:#c0c0c0; color:#000; }
    .tier-badge.fans   { background:#00aaff; color:#fff; }
    .tier-badge.core   { background:#555; color:#fff; }

    .player-info { flex:1; }
    .player-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
    .player-meta { font-size: 11px; color: #666; margin-bottom: 6px; }
    .player-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-item { font-size: 10px; color: #aaa; }
    .stat-item span { color: #00ff88; font-weight: bold; }
    .player-price { font-size: 13px; font-weight: bold; color: #ffd700; white-space: nowrap; }
    .btn-sign {
      background: #00ff88; color: #0a0a0f; border: none;
      padding: 8px 14px; font-size: 12px; font-weight: bold;
      border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
    .btn-sign:disabled { background: #333; color: #555; cursor: not-allowed; }
    .btn-sell {
      background: transparent; color: #ff4444; border: 1px solid #ff4444;
      padding: 8px 14px; font-size: 12px; font-weight: bold;
      border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
  </style>
</head>

<body>

  <!-- 구단 설정 페이지 -->
  <div id="page-setup" class="page active">
    <div class="header">
      <h1>MFC</h1>
    </div>
    <div class="home-content">
      <div>
        <div class="club-name">MY FOOTBALL CLUB</div>
        <div class="club-subtitle">구단을 만들어봐!</div>
      </div>
      <div class="home-buttons">
        <input type="text" id="input-clubname" placeholder="구단 이름을 입력해" style="background:#1a1a2e;border:2px solid #333;color:#fff;padding:14px 16px;font-size:16px;border-radius:4px;width:100%;outline:none;">
        <div style="position:relative;width:100%;">
          <input type="password" id="input-pin" placeholder="PIN 4자리 숫자" maxlength="4" style="background:#1a1a2e;border:2px solid #333;color:#fff;padding:14px 48px 14px 16px;font-size:16px;border-radius:4px;width:100%;outline:none;">
          <button onclick="togglePin()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:18px;cursor:pointer;" id="pin-eye">👁</button>
        </div>
        <button class="btn-primary" onclick="startClub()">시작하기</button>
      </div>
    </div>
  </div>

  <!-- 홈 페이지 -->
  <div id="page-home" class="page">
    <div class="header" style="justify-content:space-between;">
      <h1>MFC</h1>
      <button class="btn-back" onclick="logout()">로그아웃</button>
    </div>
    <div class="home-content">
      <div>

      </div>

        <button class="btn-secondary" onclick="goTo('page-team')">팀 관리</button>
      </div>
    </div>
  </div>

  <!-- 이적시장 페이지 -->

    </div>

        <div class="budget-amount" id="budget-display">€250M</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        <button class="filter-btn active" onclick="filterPlayers('all')">전체</button>
        <button class="filter-btn" onclick="filterPlayers('FW')">FW</button>
        <button class="filter-btn" onclick="filterPlayers('MF')">MF</button>
        <button class="filter-btn" onclick="filterPlayers('DF')">DF</button>
        <button class="filter-btn" onclick="filterPlayers('GK')">GK</button>
        <button class="filter-btn" onclick="filterPlayers('rare')">RARE</button>
        <button class="filter-btn" onclick="filterPlayers('gold')">GOLD</button>
      </div>
      <div id="player-list"></div>
    </div>
  </div>

    ];

    function getPrice(p) {
      const total = p.pac + p.sho + p.pas + p.dri + p.def + p.phy;
      return Math.round(total * TIERS[p.tier].mult / 1000000);
    }

    let budget = 250;
    let squad = [];
    let currentFilter = 'all';

    function renderMarket() {
      const list = document.getElementById('player-list');
      const filtered = PLAYERS.filter(p => {
        if (currentFilter === 'all') return true;
        if (['FW','MF','DF','GK'].includes(currentFilter)) return p.pos === currentFilter;
        return p.tier === currentFilter;
      });
      list.innerHTML = filtered.map((p, i) => {
        const price = getPrice(p);
        const owned = squad.some(s => s.n === p.n);
        const canAfford = price <= budget;
        return `<div class="player-card ${p.tier}">
          <div>
            <div class="tier-badge ${p.tier}">${TIERS[p.tier].lbl}</div>
            <div style="font-size:11px;color:#666;margin-top:4px;">${p.pos}</div>
          </div>
          <div class="player-info">
            <div class="player-name">${p.nat} ${p.n}</div>
            <div class="player-meta">${p.team}</div>
            <div class="player-stats">
              <div class="stat-item">PAC <span>${p.pac}</span></div>
              <div class="stat-item">SHO <span>${p.sho}</span></div>
              <div class="stat-item">PAS <span>${p.pas}</span></div>
              <div class="stat-item">DRI <span>${p.dri}</span></div>
              <div class="stat-item">DEF <span>${p.def}</span></div>
              <div class="stat-item">PHY <span>${p.phy}</span></div>
            </div>
          </div>
          <div style="text-align:right;">
            <div class="player-price">€${price}M</div>
            ${owned
              ? `<button class="btn-sell" onclick="sellPlayer('${p.n}')">판매</button>`
              : `<button class="btn-sign" ${canAfford?'':'disabled'} onclick="signPlayer(${PLAYERS.indexOf(p)})">영입</button>`
            }
          </div>
        </div>`;
      }).join('');
    }

    function signPlayer(idx) {
      const p = PLAYERS[idx];
      const price = getPrice(p);
      if (price > budget) return;
      if (squad.length >= 20) { alert('스쿼드가 꽉 찼어! (최대 20명)'); return; }
      budget -= price;
      squad.push(p);
      updateBudget();
      renderMarket();
    }

    function sellPlayer(name) {
      const idx = squad.findIndex(s => s.n === name);
      if (idx === -1) return;
      const p = squad[idx];
      const sellPrice = Math.floor(getPrice(p) * 0.8);
      budget += sellPrice;
      squad.splice(idx, 1);
      updateBudget();
      renderMarket();
    }

    function updateBudget() {
      document.getElementById('budget-display').textContent = `€${budget}M`;
    }

    function filterPlayers(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderMarket();
    }

    function goTo(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'page-market') renderMarket();
    }

    function logout() {
      document.getElementById('input-clubname').value = '';
      document.getElementById('input-pin').value = '';
      goTo('page-setup');
    }

    function togglePin() {
      const pin = document.getElementById('input-pin');
      pin.type = pin.type === 'password' ? 'text' : 'password';
    }

    function startClub() {
      const clubName = document.getElementById('input-clubname').value.trim();
      const pin = document.getElementById('input-pin').value.trim();

      if (!clubName) { alert('구단 이름을 입력해!'); return; }
      if (pin.length !== 4) { alert('PIN은 4자리 숫자야!'); return; }

      // 일단 홈으로 이동 (나중에 Supabase 저장 추가)
      document.querySelector('.club-name').textContent = clubName;
      goTo('page-home');
    }
  </script>
